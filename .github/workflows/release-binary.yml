name: Build and Publish Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            exe_suffix: ""
          - os: windows-latest
            name: windows-x86_64
            exe_suffix: ".exe"
          - os: macos-13
            name: macos-x86_64
            exe_suffix: ""
          - os: macos-14
            name: macos-arm64
            exe_suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable
        run: uv run pyinstaller --onefile --clean --name ccal --paths . src/main.py

      - name: Verify executable
        shell: bash
        run: |
          uv run python - <<'PY'
          import subprocess
          from pathlib import Path

          binary = Path("dist") / ("ccal.exe" if Path("dist/ccal.exe").exists() else "ccal")
          subprocess.run([str(binary), "--help"], check=True)
          PY

      - name: Stage release asset
        shell: bash
        run: |
          uv run python - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          import os
          import shutil

          asset_dir = Path("release-assets")
          asset_dir.mkdir(exist_ok=True)
          source = Path("dist") / ("ccal.exe" if Path("dist/ccal.exe").exists() else "ccal")
          asset_name = os.environ["ASSET_NAME"]
          target = asset_dir / asset_name
          shutil.copy2(source, target)
          digest = sha256(target.read_bytes()).hexdigest()
          (asset_dir / f"{asset_name}.sha256").write_text(f"{digest}  {asset_name}\n", encoding="utf-8")
          PY
        env:
          ASSET_NAME: ccal-${{ github.ref_name }}-${{ matrix.name }}${{ matrix.exe_suffix }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release-assets/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
